name: CI

on:
  push:
    branches: [main]
    tags: ['v*']        # tag pushes trigger the publish job
  pull_request:
  workflow_dispatch:    # allows manual trigger from the GitHub Actions UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create GitHub Releases
  packages: write   # needed to push to GitHub Packages

jobs:
  build-test:
    name: Build, Test & AOT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build (CS1591 WarningsAsErrors enforced)
        run: dotnet build --configuration Release --no-restore

      - name: Unit tests (no network required)
        run: dotnet test --configuration Release --no-build --filter "Category!=Integration"

      - name: Vulnerability scan
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.log
          if grep -q "has the following vulnerable" vuln.log; then
            echo "::error::Vulnerable packages detected. Review vuln.log for details."
            exit 1
          fi

      - name: AOT publish smoke test
        run: dotnet publish testapp/PolarTestApp -c Release -p:PublishAot=true
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

  integration-test:
    name: Integration Tests (sandbox)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Integration tests (live Polar sandbox)
        run: dotnet test tests/PolarSharp.IntegrationTests --configuration Release --no-build --filter "Category=Integration"
        env:
          POLAR_SANDBOX_TOKEN: ${{ secrets.POLAR_SANDBOX_TOKEN }}

  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore

      - name: Pack PolarSharp
        run: dotnet pack src/PolarSharp -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.Webhooks
        run: dotnet pack src/PolarSharp.Webhooks -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.MultiTenant
        run: dotnet pack src/PolarSharp.MultiTenant -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.Templates
        run: dotnet pack templates/PolarSharp.Templates -c Release --no-build -o artifacts/

      # ── v1.2.0 new packages — scaffolded in Phase 1; implementation lands in subsequent phases ──
      - name: Pack PolarSharp.MultiTenant.EntityFrameworkCore (+ providers)
        run: |
          dotnet pack src/PolarSharp.MultiTenant.EntityFrameworkCore -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.EntityFrameworkCore.SqlServer -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.EntityFrameworkCore.Sqlite -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.EntityFrameworkCore.PostgreSQL -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.MultiTenant.Identity (+ providers + KeyCloak)
        run: |
          dotnet pack src/PolarSharp.MultiTenant.Identity -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.Identity.SqlServer -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.Identity.Sqlite -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.Identity.PostgreSQL -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.MultiTenant.Identity.KeyCloak -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.Onboarding
        run: dotnet pack src/PolarSharp.Onboarding -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.EcommerceStoreManagement (+ EF providers + translation providers)
        run: |
          dotnet pack src/PolarSharp.EcommerceStoreManagement -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.EntityFrameworkCore -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.EntityFrameworkCore.SqlServer -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.EntityFrameworkCore.Sqlite -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.EntityFrameworkCore.PostgreSQL -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.Translation.Anthropic -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.Translation.OpenAI -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.EcommerceStoreManagement.Translation.AzureOpenAI -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.Reporting (+ EF providers)
        run: |
          dotnet pack src/PolarSharp.Reporting -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.Reporting.EntityFrameworkCore -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.Reporting.EntityFrameworkCore.SqlServer -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.Reporting.EntityFrameworkCore.Sqlite -c Release --no-build -o artifacts/
          dotnet pack src/PolarSharp.Reporting.EntityFrameworkCore.PostgreSQL -c Release --no-build -o artifacts/

      - name: Pack PolarSharp.DataSeeding
        run: dotnet pack src/PolarSharp.DataSeeding -c Release --no-build -o artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

      - name: Push to GitHub Packages
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/mollsandhersh/index.json" --skip-duplicate

      - name: Create or update GitHub Release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" artifacts/*.nupkg --clobber
          else
            gh release create "${{ github.ref_name }}" artifacts/*.nupkg \
              --title "PolarSharp ${{ github.ref_name }}" \
              --notes "See [CHANGELOG.md](https://github.com/mollsandhersh/Polar.sh_Nuget/blob/main/CHANGELOG.md) for release notes."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
